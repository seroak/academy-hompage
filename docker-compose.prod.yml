services:
  postgres:
    image: postgres:16-alpine
    container_name: academy-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend_blue: &backend
    build:
      context: ./backend
    image: ghcr.io/seroak/academy-hompage-backend:latest
    container_name: academy-backend-blue
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # blue/green 무중단 배포용 두 번째 인스턴스. 평시엔 내려가 있고 배포 시에만 기동한다(profiles로 기본 `up -d`에서 제외).
  backend_green:
    <<: *backend
    container_name: academy-backend-green
    profiles: ['green']

  caddy:
    image: caddy:2-alpine
    container_name: academy-caddy-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend_blue

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:
