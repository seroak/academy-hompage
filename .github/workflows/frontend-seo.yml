name: Frontend SEO

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-seo.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-seo.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3420
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4310
      NAVER_SITE_VERIFICATION: ci-naver-verification
      GOOGLE_SITE_VERIFICATION: ci-google-verification
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run seo:audit

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm install --global vercel@latest

      - name: Pull Vercel 프로젝트 설정
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: (진단) NEXT_PUBLIC_SITE_URL 확인
        run: grep -H "NEXT_PUBLIC_SITE_URL\|NEXT_PUBLIC_API_BASE_URL" .vercel/.env.production.local || echo "해당 키 없음"

      - name: 프로덕션 빌드
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel에 배포
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
