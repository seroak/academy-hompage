name: Frontend SEO

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-seo.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-seo.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3420
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4310
      NAVER_SITE_VERIFICATION: ci-naver-verification
      GOOGLE_SITE_VERIFICATION: ci-google-verification
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run seo:audit
