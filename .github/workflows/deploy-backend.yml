name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/seroak/academy-hompage-backend:latest
            ghcr.io/seroak/academy-hompage-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd ~/academy-hompage
            git pull origin main

            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.production --profile green"

            ACTIVE=""
            for c in blue green; do
              if [ "$(docker inspect -f '{{.State.Running}}' academy-backend-$c 2>/dev/null)" = "true" ]; then
                ACTIVE=$c
              fi
            done
            if [ "$ACTIVE" = "blue" ]; then STANDBY=green; else STANDBY=blue; fi
            echo "active=${ACTIVE:-none} standby=$STANDBY"

            $COMPOSE pull backend_$STANDBY
            $COMPOSE up -d backend_$STANDBY

            STATUS="starting"
            for i in $(seq 1 20); do
              STATUS=$(docker inspect -f '{{.State.Health.Status}}' academy-backend-$STANDBY 2>/dev/null || echo "missing")
              [ "$STATUS" = "healthy" ] && break
              sleep 3
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "backend_$STANDBY health check failed (status=$STATUS), rolling back"
              docker logs --tail 100 academy-backend-$STANDBY || true
              $COMPOSE stop backend_$STANDBY
              $COMPOSE rm -f backend_$STANDBY
              exit 1
            fi

            docker exec academy-caddy-prod caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile

            if [ -n "$ACTIVE" ]; then
              $COMPOSE stop backend_$ACTIVE
              $COMPOSE rm -f backend_$ACTIVE
            fi

            docker image prune -f
